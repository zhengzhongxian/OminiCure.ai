name: omnicure-patient-dev

services:
  patient-service:
    build:
      context: ..
      dockerfile: PatientService/Dockerfile
      args:
        BUILD_PROFILE: dev
    container_name: omnicure-patient-service-dev
    ports:
      - "5007:8080"
      - "5008:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - omnicure-network-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  omnicure-network-dev:
    external: true
