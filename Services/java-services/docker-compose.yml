name: omnicure-java

services:
  iam-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: iam-service
    container_name: omnicure-iam-service
    ports:
      - "${IAM_SERVICE_PORT:-5000}:8080"
      - "${IAM_SERVICE_HEALTH_PORT:-5010}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
    networks:
      - omnicure-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  patient-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: patient-service
    container_name: omnicure-patient-service
    ports:
      - "${PATIENT_SERVICE_PORT:-5007}:8080"
      - "${PATIENT_SERVICE_HEALTH_PORT:-5008}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
    networks:
      - omnicure-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

networks:
  omnicure-network:
    external: true
