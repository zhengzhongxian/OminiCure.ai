server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: iam-service
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:OmniCureDev2024!}
    mongodb:
      uri: ${MONGO_URI:mongodb://mongo1:27017,mongo2:27018/omnicure_iam?replicaSet=rs0}
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:OmniCureDev2024!}
app:
  migration:
    max-retries: ${MIGRATION_MAX_RETRIES:5}
    retry-interval: ${MIGRATION_RETRY_INTERVAL:5000}
  datasource:
    write:
      url: ${POSTGRES_WRITE_URL:jdbc:postgresql://postgres-write:5432/omnicure_iam}
      username: ${POSTGRES_USER:omnicure}
      password: ${POSTGRES_PASSWORD:OmniCureDev2024!}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: ${DB_MAX_POOL_SIZE:20}
        minimum-idle: ${DB_MIN_IDLE:5}
        connection-timeout: ${DB_CONN_TIMEOUT:30000}
    read:
      url: ${POSTGRES_READ_URL:jdbc:postgresql://postgres-read:5432/omnicure_iam}
      username: ${POSTGRES_USER:omnicure}
      password: ${POSTGRES_PASSWORD:OmniCureDev2024!}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: ${DB_MAX_POOL_SIZE:20}
        minimum-idle: ${DB_MIN_IDLE:5}
        connection-timeout: ${DB_CONN_TIMEOUT:30000}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:true}
    out-of-order: false
    validate-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    jwt:
      key: "b21uaWN1cmUtYWktY29yZS1zZWNyZXQta2V5LTIwMjQ="
      issuer: "omnicure"
      audience: "omnicure-clients"
      access-token-duration-minutes: 30
      refresh-token-duration-days: 7

redis:
  refresh-tokens:
    prefix-key: "rt"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    ai.omnicure: ${LOG_LEVEL:DEBUG}
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
