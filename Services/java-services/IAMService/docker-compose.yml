name: omnicure-iam

services:
  iam-service:
    build:
      context: ..
      dockerfile: IAMService/Dockerfile
      args:
        BUILD_PROFILE: ${BUILD_PROFILE:-production}
    container_name: omnicure-iam-service
    ports:
      - "${IAM_SERVICE_PORT}:8080"
      - "${IAM_SERVICE_HEALTH_PORT}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    networks:
      - omnicure-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

networks:
  omnicure-network:
    external: true
