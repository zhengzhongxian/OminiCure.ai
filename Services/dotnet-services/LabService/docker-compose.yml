version: '3.8'

name: omnicure-lab

services:
  # Lab Service
  lab-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    container_name: omnicure-lab-service
    ports:
      - "${LAB_SERVICE_PORT}:80"
      - "${LAB_SERVICE_HEALTH_PORT}:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    depends_on:
      - redis
      - rabbitmq
    networks:
      - omnicure-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

networks:
  omnicure-network:
    external: true
