version: '3.8'

name: omnicure-billing-dev

services:
  billing-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: Debug
    container_name: omnicure-billing-service-dev
    ports:
      - "5001:80"
      - "5002:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - postgres-write
      - redis
      - rabbitmq
    networks:
      - omnicure-network-dev
    volumes:
      - ./src/BillingService.API:/src/BillingService.API
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  omnicure-network-dev:
    external: true
