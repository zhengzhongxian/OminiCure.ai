server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: patient-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongo1:27017,mongo2:27018/omnicure_patient?replicaSet=rs0}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    ai.omnicure: ${LOG_LEVEL:INFO}
