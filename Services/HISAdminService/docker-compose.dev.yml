version: '3.8'

name: omnicure-hisadmin-dev

services:
  hisadmin-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: Debug
    container_name: omnicure-hisadmin-service-dev
    ports:
      - "5005:80"
      - "5006:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - oracle-db
      - redis
      - kafka
    networks:
      - omnicure-network-dev
    volumes:
      - ./src/HISAdmin.API:/src/HISAdmin.API
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  omnicure-network-dev:
    external: true
