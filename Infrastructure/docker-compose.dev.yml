name: omnicure-infra-dev

services:
  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: omnicure-rabbitmq-dev
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: OmniCureDev2024!
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    networks:
      - omnicure-network-dev
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

  # PostgreSQL - Write (Primary)
  postgres-write:
    image: postgres:16
    container_name: omnicure-postgres-write-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: omnicure
      POSTGRES_PASSWORD: OmniCureDev2024!
      POSTGRES_DB: omnicure
    volumes:
      - postgres_write_data_dev:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/postgres-init.sql
      - ./scripts/postgres/primary-wrapper.sh:/usr/local/bin/primary-wrapper.sh
    entrypoint:
      - bash
      - -c
      - tr -d '\r' < /usr/local/bin/primary-wrapper.sh > /tmp/primary-wrapper.sh && chmod +x /tmp/primary-wrapper.sh && exec /tmp/primary-wrapper.sh "$@"
      - --
    command: ["postgres", "-c", "wal_level=replica", "-c", "max_wal_senders=10", "-c", "max_replication_slots=10", "-c", "hot_standby=on"]
    networks:
      - omnicure-network-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnicure"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Replica Set - Primary
  mongo1:
    image: mongo:7.0
    container_name: omnicure-mongo1-dev
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data_dev:/data/db
      - ../scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
    networks:
      - omnicure-network-dev

  # MongoDB Replica Set - Secondary
  mongo2:
    image: mongo:7.0
    container_name: omnicure-mongo2-dev
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    ports:
      - "27018:27018"
    volumes:
      - mongo2_data_dev:/data/db
    networks:
      - omnicure-network-dev
    depends_on:
      - mongo1

  # PostgreSQL - Read (Replica)
  postgres-read:
    image: postgres:16
    container_name: omnicure-postgres-read-dev
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: omnicure
      POSTGRES_PASSWORD: OmniCureDev2024!
      POSTGRES_DB: omnicure
    volumes:
      - postgres_read_data_dev:/var/lib/postgresql/data
      - ./scripts/postgres/replica-wrapper.sh:/usr/local/bin/replica-wrapper.sh
    entrypoint:
      - bash
      - -c
      - tr -d '\r' < /usr/local/bin/replica-wrapper.sh > /tmp/replica-wrapper.sh && chmod +x /tmp/replica-wrapper.sh && exec /tmp/replica-wrapper.sh "$@"
      - --
    command: ["postgres", "-c", "hot_standby=on"]
    networks:
      - omnicure-network-dev
    depends_on:
      - postgres-write
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnicure"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis/redis-stack:latest
    container_name: omnicure-redis-dev
    ports:
      - "6379:6379"
      - "8001:8001"
    environment:
      REDIS_ARGS: "--requirepass OmniCureDev2024! --maxmemory 512mb --maxmemory-policy allkeys-lru"
    volumes:
      - redis_data_dev:/data
    networks:
      - omnicure-network-dev

  # Kong API Gateway (DB-less mode)
  kong:
    image: kong:3.6.1-ubuntu
    container_name: omnicure-kong-dev
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/opt/kong/kong.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8002:8001"
      - "8444:8444"
    volumes:
      - ./kong:/opt/kong
    networks:
      - omnicure-network-dev

  # ELK Stack - Commented out (not in use yet)
