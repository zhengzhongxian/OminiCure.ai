volumes:
  rabbitmq_data_dev:
    driver: local
  postgres_write_data_dev:
    driver: local
  postgres_read_data_dev:
    driver: local
  mongo1_data_dev:
    driver: local
  mongo2_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  # elasticsearch_data_dev:  # Commented out (ELK stack not in use)
  #   driver: local

networks:
  omnicure-network-dev:
    driver: bridge
    name: omnicure-network-dev
