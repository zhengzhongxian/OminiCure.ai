_format_version: "3.0"

plugins:
  # Rate Limiting
  - name: rate-limiting
    config:
      minute: 100
      policy: redis
      redis:
        host: redis
        port: 6379
        password: ChangeMe_In_Production_2024!
      limit_by: ip

  # CORS
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "https://app.omnicure.ai"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Requested-With
        - X-Tenant-Id
      exposed_headers:
        - X-Total-Count
        - X-Page-Number
        - X-Page-Size
      max_age: 3600
      credentials: true

  - name: request-transformer
    config:
      add:
        headers:
          - X-Request-ID:$(uuid)
          - X-Gateway-Version:1.0.0

  - name: jwt
    config:
      uri_param_names:
        - jwt
      cookie_names:
        - jwt
      header_names:
        - Authorization
      algorithm: HS256
      secret_is_base64: true
      claims_to_verify:
        - exp
      run_on_preflight: true

  - name: ip-restriction
    config:
      deny: []
      message: Access denied from your IP

services:
  - name: iam-service
    url: http://iam-service:5000
    connect_timeout: 5000
    write_timeout: 30000
    read_timeout: 30000
    routes:
      - name: iam-auth-route
        paths:
          - /api/auth
        strip_path: false
        methods:
          - POST
      - name: iam-users-route
        paths:
          - /api/users
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
      - name: iam-roles-route
        paths:
          - /api/roles
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 60

  # ------------------------------------------------------------------------------
  # Billing & Insurance Service
