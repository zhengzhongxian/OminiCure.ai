# ==============================================================================
# Consumers (for JWT auth)
# ==============================================================================
consumers:
  - username: omnicure-users
    jwt_secrets:
      - algorithm: HS256
        key: omnicure
        secret: b21uaWN1cmUtYWktY29yZS1zZWNyZXQta2V5LTIwMjQ=

# ==============================================================================
# Upstream & Targets (Load Balancing)
# ==============================================================================
upstreams:
  - name: billing-upstream
    algorithm: round-robin
    targets:
      - target: billing-service:5001
        weight: 100
  - name: lab-upstream
    algorithm: round-robin
    targets:
      - target: lab-service:5003
        weight: 100
  - name: hisadmin-upstream
    algorithm: round-robin
    targets:
      - target: hisadmin-service:5005
        weight: 100
