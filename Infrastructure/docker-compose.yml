version: '3.8'

name: omnicure-infra

services:
  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: omnicure-rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - omnicure-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

  # PostgreSQL - Write (Primary)
  postgres-write:
    image: postgres:16
    container_name: omnicure-postgres-write
    ports:
      - "${POSTGRES_WRITE_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_write_data:/var/lib/postgresql/data
      - ./scripts/postgres/primary-wrapper.sh:/usr/local/bin/primary-wrapper.sh
    entrypoint:
      - bash
      - -c
      - tr -d '\r' < /usr/local/bin/primary-wrapper.sh > /tmp/primary-wrapper.sh && chmod +x /tmp/primary-wrapper.sh && exec /tmp/primary-wrapper.sh "$@"
      - --
    command: ["postgres", "-c", "wal_level=replica", "-c", "max_wal_senders=10", "-c", "max_replication_slots=10", "-c", "hot_standby=on"]
    networks:
      - omnicure-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - Read (Replica)
  postgres-read:
    image: postgres:16
    container_name: omnicure-postgres-read
    ports:
      - "${POSTGRES_READ_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_read_data:/var/lib/postgresql/data
      - ./scripts/postgres/replica-wrapper.sh:/usr/local/bin/replica-wrapper.sh
    entrypoint:
      - bash
      - -c
      - tr -d '\r' < /usr/local/bin/replica-wrapper.sh > /tmp/replica-wrapper.sh && chmod +x /tmp/replica-wrapper.sh && exec /tmp/replica-wrapper.sh "$@"
      - --
    command: ["postgres", "-c", "hot_standby=on"]
    networks:
      - omnicure-network
    restart: unless-stopped
    depends_on:
      - postgres-write
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Replica Set - Primary
  mongo1:
    image: mongo:7.0
    container_name: omnicure-mongo1
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
    networks:
      - omnicure-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --port 27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Replica Set - Secondary
  mongo2:
    image: mongo:7.0
    container_name: omnicure-mongo2
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    ports:
      - "27018:27018"
    volumes:
      - mongo2_data:/data/db
    networks:
      - omnicure-network
    restart: unless-stopped
    depends_on:
      - mongo1

  # Redis
  redis:
    image: redis/redis-stack:${REDIS_VERSION}
    container_name: omnicure-redis
    ports:
      - "${REDIS_PORT}:6379"
      - "${REDIS_INSIGHT_PORT}:8001"
    environment:
      REDIS_ARGS: "--requirepass ${REDIS_PASSWORD} --maxmemory ${REDIS_MAXMEMORY} --maxmemory-policy ${REDIS_MAXMEMORY_POLICY}"
    volumes:
      - redis_data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - omnicure-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: omnicure-elasticsearch
    ports:
      - "${ELASTIC_PORT}:9200"
      - "${ELASTIC_TRANSPORT_PORT}:9300"
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=${ELASTIC_JAVA_OPTS}
      - cluster.name=omnicure-elk
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./config/elasticsearch/jvm.options:/usr/share/elasticsearch/config/jvm.options
    networks:
      - omnicure-network
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:${ELASTIC_PASSWORD} -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_VERSION}
    container_name: omnicure-logstash
    ports:
      - "${LOGSTASH_PORT}:5044"
      - "${LOGSTASH_API_PORT}:9600"
    environment:
      LS_JAVA_OPTS: ${LOGSTASH_JAVA_OPTS}
    volumes:
      - ./config/logstash/pipeline:/usr/share/logstash/pipeline
      - ./config/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml
    networks:
      - omnicure-network
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600/_node/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION}
    container_name: omnicure-kibana
    ports:
      - "${KIBANA_PORT}:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=${KIBANA_ELASTIC_USER}
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=false
    volumes:
      - ./config/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml
    networks:
      - omnicure-network
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  rabbitmq_data:
    driver: local
  postgres_write_data:
    driver: local
  postgres_read_data:
    driver: local
  mongo1_data:
    driver: local
  mongo2_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  omnicure-network:
    driver: bridge
    name: omnicure-network
